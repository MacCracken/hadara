name: Release

on:
  push:
    tags: ['[0-9]*']

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then CYML_VERSION="$FILE_VERSION"; else CYML_VERSION="$CYML_RAW"; fi
          TAG="${GITHUB_REF_NAME}"
          [ "$FILE_VERSION" = "$TAG" ] || { echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          [ "$CYML_VERSION" = "$TAG" ] || { echo "cyrius.cyml ($CYML_RAW) != tag ($TAG)"; exit 1; }

      - name: Install Cyrius toolchain
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: cyrius deps

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/hadara
          echo "hadara: $(wc -c < build/hadara) bytes"

      - name: Regenerate bundle
        run: cyrius distlib

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="hadara-${TAG}/" -o "hadara-${TAG}-src.tar.gz" HEAD
          cp dist/hadara.cyr "hadara-${TAG}.cyr"
          sha256sum hadara-*.tar.gz hadara-*.cyr build/hadara > SHA256SUMS

      - name: Extract changelog
        run: |
          awk "/^## \\[${GITHUB_REF_NAME}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "hadara ${{ github.ref_name }}"
          body_path: /tmp/body.md
          files: |
            hadara-*.tar.gz
            hadara-*.cyr
            build/hadara
            SHA256SUMS
