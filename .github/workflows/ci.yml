name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          set -e
          # The cyrius.cyml `[package].cyrius` pin is the single source of
          # truth for the toolchain version — no version is hardcoded here.
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: cyrius deps

      - name: Lint
        # Hard gate: any non-cosmetic `warn` line fails CI.
        run: |
          fail=0
          for f in src/*.cyr; do
            out=$(cyrius lint "$f" 2>&1 || true)
            echo "$out"
            bad=$(echo "$out" | grep -E '^[[:space:]]*warn ' | grep -v 'exceeds 120 characters' || true)
            if [ -n "$bad" ]; then echo "lint: warnings in $f"; fail=1; fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/hadara
          echo "hadara: $(wc -c < build/hadara) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/hadara | grep -q "7f45 4c46"

      - name: Unit tests
        run: |
          cyrius test tests/hadara.tcyr 2>&1 | tee /tmp/test_output
          tail -1 /tmp/test_output | grep "0 failed"

      - name: Benchmarks
        # Run the suite to catch performance regressions / build breakage.
        run: |
          CYRIUS_DCE=1 cyrius build tests/hadara.bcyr build/bench
          ./build/bench

      - name: Verify dist bundle is current
        # dist/hadara.cyr is committed for consumers; ensure it matches source.
        run: |
          cyrius distlib
          git diff --exit-code dist/hadara.cyr || { echo "dist/hadara.cyr is stale — run 'cyrius distlib' and commit"; exit 1; }

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # ${file:VERSION} template means cyml derives from the VERSION file.
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then CYML_VERSION="$FILE_VERSION"; else CYML_VERSION="$CYML_RAW"; fi
          [ "$FILE_VERSION" = "$CYML_VERSION" ] || { echo "VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_RAW)"; exit 1; }
          grep -q "$FILE_VERSION" CHANGELOG.md || { echo "version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent: $FILE_VERSION"
